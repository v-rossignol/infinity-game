openapi: 3.1.0
info:
  title: Infinity Server — Game API
  version: 0.3.0
  description: |
    Gameplay routes: health, players, galaxy, planets, and resources.

    **Base path:** `/infinity` (see `servers`).

    **Authentication:** Most galaxy and player routes require JWT (cookie `infinity_token`
    or `Authorization: Bearer <jwt>`). Health, public player lookup, planets, and resources
    are public unless noted.

    **Related specs:** [auth-api.yaml](./auth-api.yaml) · [admin-api.yaml](./admin-api.yaml)
    · **Socket.IO:** [asyncapi.yaml](./asyncapi.yaml)
  contact:
    name: Roro LeSage
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://localhost:4000/infinity
    description: Local development (port configurable via `PORT`, default 4000)

tags:
  - name: Health
  - name: Players
  - name: Galaxy
  - name: Systems
  - name: Planets
  - name: Resources
  - name: Units

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Server health check
      description: Lightweight check; does not verify database connectivity.
      security: []
      responses:
        '200':
          description: Server is running
          content:
            application/json:
              schema:
                $ref: schemas/responses/health.json

  /players/me/enter-game:
    post:
      tags: [Players]
      operationId: enterGame
      summary: Bootstrap or resume playable state
      description: |
        First-time entry orchestrates world spawn (cube → star → planet → hex).
        Idempotent when `location` is already set.
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Player profile (spawned or existing)
          content:
            application/json:
              schema:
                $ref: schemas/responses/player-wrapper.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '503':
          description: Spawn allocation failed after retries
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units:
    get:
      tags: [Players, Units]
      operationId: listMyUnitInstances
      summary: List caller-owned unit instances
      description: |
        Returns all unit instances owned by the authenticated player's profile,
        each with an embedded catalog `type` definition.
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Owned unit instances
          content:
            application/json:
              schema:
                $ref: schemas/responses/unit-instance-with-type-list.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          description: Player profile not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units/{unitId}/buildable:
    get:
      tags: [Players, Units]
      operationId: listBuildableUnitTypes
      summary: List unit types the builder can construct
      description: |
        Returns catalog unit types the caller-owned builder may construct: the type has a
        `recipe`, matches the builder `building` capability targets, and optionally matches
        the target hex biome when `planetId`, `q`, and `r` are all provided.

        Each entry includes `buildDurationMs` for this builder (`recipe.work / building.speed
        × PLANET_BASE_BUILD_MS`). Returns an empty array when the builder has no building
        capability.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: planetId
          in: query
          required: false
          schema:
            type: string
          description: Required with `q` and `r` to filter by target hex biome.
        - name: q
          in: query
          required: false
          schema:
            type: integer
          description: Target hex axial q — required with `planetId` and `r` for biome filter.
        - name: r
          in: query
          required: false
          schema:
            type: integer
          description: Target hex axial r — required with `planetId` and `q` for biome filter.
      responses:
        '200':
          description: Buildable unit types for this builder
          content:
            application/json:
              schema:
                $ref: schemas/responses/buildable-unit-type-list.json
        '400':
          description: Partial hex query (`planetId`, `q`, `r` must be provided together)
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Unit not owned by caller
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Unit or catalog type not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units/{unitId}/move:
    post:
      tags: [Players, Units]
      operationId: moveUnitInstance
      summary: Order a unit to move to a target hex
      description: |
        Initiates timed movement for the caller-owned unit to a destination hex on the
        same planet. The unit must be `idle`, mobile, and within range.

        On success the unit's status becomes `moving` and `arrivalAt` is returned.
        When the unit arrives the server pushes a `UNIT_UPDATE` WebSocket event to the
        `planetId` Socket.IO room with `status: 'idle'` and the final `location`.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/move-unit.json
      responses:
        '200':
          description: Move order accepted — unit is now moving
          content:
            application/json:
              schema:
                $ref: schemas/responses/move-order-result.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Unit not owned by caller
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Unit or catalog type not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '409':
          description: Unit is already moving
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '422':
          description: Unit not at planet depth, not mobile, or target out of range
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units/{unitId}/stop:
    post:
      tags: [Players, Units]
      operationId: stopUnitInstance
      summary: Stop a unit that is currently moving
      description: |
        Halts in-progress movement for the caller-owned unit on the specified planet.
        The unit must be `moving`.

        The server resolves the unit's current surface position from the active movement
        metadata (origin, destination, startedAt, arrivalAt), persists it, sets status to
        `idle`, and pushes a `UNIT_UPDATE` WebSocket event to the `planetId` room — same
        delivery as natural arrival.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/stop-unit.json
      responses:
        '200':
          description: Stop order accepted — unit is now idle
          content:
            application/json:
              schema:
                $ref: schemas/responses/stop-order-result.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Unit not owned by caller
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Unit not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '409':
          description: Unit is not moving
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '422':
          description: Unit not on the specified planet or movement metadata invalid
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units/{unitId}/extract:
    post:
      tags: [Players, Units]
      operationId: extractUnitResources
      summary: Start extracting a resource at the unit's current hex
      description: |
        Starts timed resource extraction for the caller-owned unit on the specified planet.
        The unit must be `idle`, have extraction capability, and be located in a hex that
        contains the requested resource type.

        On success the unit's status becomes `extracting`. Every minute the server adds
        `biome.quantity × extraction.speed` to cargo (clamped to capacity) and emits a
        `UNIT_UPDATE` WebSocket event with updated cargo. Extraction stops automatically
        when cargo is full, or via `stop-extraction`.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/extract-unit.json
      responses:
        '200':
          description: Extract order accepted — unit is now extracting
          content:
            application/json:
              schema:
                $ref: schemas/responses/extract-order-result.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Unit not owned by caller
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Unit or catalog type not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '409':
          description: Unit is not idle
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '422':
          description: Unit not on planet, cannot extract, resource absent, or cargo full
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units/{unitId}/stop-extraction:
    post:
      tags: [Players, Units]
      operationId: stopUnitExtraction
      summary: Stop a unit that is currently extracting
      description: |
        Halts in-progress extraction for the caller-owned unit on the specified planet.
        The unit must be `extracting`.

        The server applies a partial tick yield from `lastTickAt`, adds it to cargo,
        sets status to `idle`, and pushes a `UNIT_UPDATE` WebSocket event to the
        `planetId` room with updated cargo.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/stop-unit.json
      responses:
        '200':
          description: Stop extraction accepted — unit is now idle
          content:
            application/json:
              schema:
                $ref: schemas/responses/stop-extraction-order-result.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Unit not owned by caller
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Unit not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '409':
          description: Unit is not extracting
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '422':
          description: Unit not on the specified planet or extraction metadata invalid
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units/{unitId}/build:
    post:
      tags: [Players, Units]
      operationId: buildUnit
      summary: Start building a unit at a chosen planet hex building zone
      description: |
        Starts timed construction for the caller-owned builder unit on the specified planet.
        The builder must be `idle`, have a `building` capability that allows the target type,
        carry enough cargo for the target recipe, and the target hex biome must match the
        target unit type `environments`.

        Placement uses a `buildingZoneId` (one of 15 zones per hex — 9 central, 6 side).
        Only small-footprint target types are supported for now.

        Ingredients are deducted from builder cargo when the build starts. Canceling does not
        refund resources. On success the builder status becomes `building`. When complete the
        server creates the new unit instance and emits `UNIT_UPDATE` for both builder and built
        unit on the planet room.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/build-unit.json
      responses:
        '200':
          description: Build order accepted — builder is now building
          content:
            application/json:
              schema:
                $ref: schemas/responses/build-order-result.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Unit not owned by caller
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Unit or catalog type not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '409':
          description: Builder is not idle
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '422':
          description: Builder cannot build target, invalid biome, unknown recipe resource, or insufficient cargo
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units/{unitId}/stop-build:
    post:
      tags: [Players, Units]
      operationId: stopUnitBuild
      summary: Stop a unit that is currently building
      description: |
        Halts in-progress construction for the caller-owned builder on the specified planet.
        The unit must be `building`. Consumed recipe ingredients are not refunded. On success
        the server emits a `UNIT_UPDATE` WebSocket event to the `planetId` room.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/stop-unit.json
      responses:
        '200':
          description: Stop build accepted — builder is now idle
          content:
            application/json:
              schema:
                $ref: schemas/responses/stop-build-order-result.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Unit not owned by caller
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Unit not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '409':
          description: Unit is not building
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '422':
          description: Unit not on the specified planet or building metadata invalid
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units/{unitId}/drop:
    post:
      tags: [Players, Units]
      operationId: dropUnitCargo
      summary: Drop a resource from unit cargo
      description: |
        Removes a quantity of a resource from the caller-owned unit cargo on the specified
        planet. The unit must be `idle` (not moving or extracting) and carry at least the
        requested amount of the resource.

        Dropped resources are discarded (not placed on the hex). On success the server emits
        a `UNIT_UPDATE` WebSocket event to the `planetId` room with updated cargo.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/drop-cargo.json
      responses:
        '200':
          description: Drop accepted — cargo updated
          content:
            application/json:
              schema:
                $ref: schemas/responses/drop-cargo-order-result.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Unit not owned by caller
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Unit or catalog type not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '409':
          description: Unit is moving or extracting
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '422':
          description: Unit not on planet, insufficient cargo, or invalid amount
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units/{unitId}/transfer-to:
    post:
      tags: [Players, Units]
      operationId: transferUnitCargo
      summary: Transfer cargo between parked units
      description: |
        Moves resources from the caller-owned source unit (`unitId`) to a caller-owned target
        unit on the same planet. Transfer is allowed only when one unit is parked in the other's
        garage (vehicle `metadata.parking.garageUnitId` matches the building, or the reverse).

        Both unit types must have cargo capability. The request is all-or-nothing: if any
        resource quantity exceeds source cargo or target remaining capacity, nothing is moved.
        Parked (`inactive`) vehicles may send or receive cargo; units that are `moving` or
        `building` are rejected.

        On success the server emits `UNIT_UPDATE` WebSocket events to the `planetId` room for
        both the source and target units with updated `cargo`.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/transfer-cargo.json
      responses:
        '200':
          description: Transfer accepted — cargo updated on both units
          content:
            application/json:
              schema:
                $ref: schemas/responses/transfer-cargo-order-result.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Source or target unit not owned by caller
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Unit or catalog type not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '409':
          description: Source or target unit is moving or building
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '422':
          description: Units not parked together, not on planet, insufficient cargo, or capacity exceeded
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units/{unitId}/park:
    post:
      tags: [Players, Units]
      operationId: parkUnit
      summary: Park a vehicle in a nearby garage
      description: |
        Parks a caller-owned vehicle in a caller-owned garage building on the same planet.
        The vehicle must be `idle`. The garage must have garage capability, accept the
        vehicle size, have free space, and be within `PLANET_GARAGE_RANGE_HEX` surface
        distance. On success the vehicle status becomes `inactive`,
        `metadata.parking.garageUnitId` is set, and the garage building's `garage` field
        records `{ id, typeId }` for the parked vehicle. The server emits `UNIT_UPDATE`
        WebSocket events to the `planetId` room for both the vehicle and the garage unit.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/park-unit.json
      responses:
        '200':
          description: Park accepted — vehicle inactive
          content:
            application/json:
              schema:
                $ref: schemas/responses/park-unit-order-result.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Vehicle or garage not owned by caller
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Vehicle, garage, planet, or catalog type not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '409':
          description: Vehicle or garage is not idle, or vehicle already parked
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '422':
          description: Not a vehicle, no garage capability, out of range, size unsupported, or garage full
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/units/{unitId}/unpark:
    post:
      tags: [Players, Units]
      operationId: unparkUnit
      summary: Unpark a vehicle from a garage
      description: |
        Restores a parked (`inactive`) caller-owned vehicle to `idle` on the specified planet.
        Clears `metadata.parking` and removes the vehicle from the garage building's `garage`
        field. The server emits `UNIT_UPDATE` WebSocket events to the `planetId` room for
        both the vehicle and the garage unit.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: unitId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/stop-unit.json
      responses:
        '200':
          description: Unpark accepted — vehicle idle
          content:
            application/json:
              schema:
                $ref: schemas/responses/unpark-unit-order-result.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Unit not owned by caller
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Unit not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '409':
          description: Unit is not parked
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '422':
          description: Unit not on planet or parking metadata invalid
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/{userId}:
    get:
      tags: [Players]
      operationId: getPlayerByUserId
      summary: Get or create player profile
      description: "Public route. Creates a freshy player (`location: null`) when absent."
      security: []
      parameters:
        - $ref: openapi-shared.yaml#/components/parameters/userId
      responses:
        '200':
          description: Player profile
          content:
            application/json:
              schema:
                $ref: schemas/responses/player.json

  /players/me/location:
    patch:
      tags: [Players]
      operationId: updatePlayerLocation
      summary: Replace player location
      description: "Sets the full `location` object or `null`."
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/update-location.json
      responses:
        '200':
          description: Updated player
          content:
            application/json:
              schema:
                $ref: schemas/responses/player-wrapper.json
        '400':
          $ref: openapi-shared.yaml#/components/responses/BadRequest
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound

  /players/me/location/enter-system:
    post:
      tags: [Players]
      operationId: enterStarSystem
      summary: Transition cube → star system
      description: |
        Regular players must already be at cube depth.
        **Admin users** (`role: admin`) may relocate directly to any star system from any depth;
        the server resolves `cube` from the target star and validates that the star exists (404 if not found).
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/enter-star-system.json
      responses:
        '200':
          description: Updated player at star-system depth
          content:
            application/json:
              schema:
                $ref: schemas/responses/player-wrapper.json
        '400':
          $ref: openapi-shared.yaml#/components/responses/BadRequest
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound
        '409':
          $ref: openapi-shared.yaml#/components/responses/Conflict

  /players/me/location/enter-planet:
    post:
      tags: [Players]
      operationId: enterPlanet
      summary: Transition star system → planet
      description: |
        Regular players must already be at star-system depth.
        Hex coordinates (`q`, `r`) are optional — omit them for planet overview (no hex selected).
        **Admin users** (`role: admin`) may relocate directly to any planet from any depth;
        the server resolves `cube` and `starSystem` from the target planet and validates
        that the planet exists in the star system (404 if not found).
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/enter-planet.json
      responses:
        '200':
          description: Updated player at planet depth
          content:
            application/json:
              schema:
                $ref: schemas/responses/player-wrapper.json
        '400':
          $ref: openapi-shared.yaml#/components/responses/BadRequest
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound
        '409':
          $ref: openapi-shared.yaml#/components/responses/Conflict
        '422':
          description: Gas planets have no enterable surface
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /players/me/location/leave-planet:
    post:
      tags: [Players]
      operationId: leavePlanet
      summary: Transition planet → star system
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/leave-planet.json
      responses:
        '200':
          description: Updated player at star-system depth
          content:
            application/json:
              schema:
                $ref: schemas/responses/player-wrapper.json
        '400':
          $ref: openapi-shared.yaml#/components/responses/BadRequest
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound
        '409':
          $ref: openapi-shared.yaml#/components/responses/Conflict

  /players/me/location/leave-system:
    post:
      tags: [Players]
      operationId: leaveStarSystem
      summary: Transition star system → cube
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/leave-star-system.json
      responses:
        '200':
          description: Updated player at cube depth
          content:
            application/json:
              schema:
                $ref: schemas/responses/player-wrapper.json
        '400':
          $ref: openapi-shared.yaml#/components/responses/BadRequest
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound
        '409':
          $ref: openapi-shared.yaml#/components/responses/Conflict

  /players/me/location/cube:
    patch:
      tags: [Players]
      operationId: updateCubePosition
      summary: Update cube-depth local position
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/shared/vec3-local.json
      responses:
        '200':
          description: Updated player
          content:
            application/json:
              schema:
                $ref: schemas/responses/player-wrapper.json
        '400':
          $ref: openapi-shared.yaml#/components/responses/BadRequest
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound
        '409':
          $ref: openapi-shared.yaml#/components/responses/Conflict

  /players/me/location/system:
    patch:
      tags: [Players]
      operationId: updateSystemPosition
      summary: Update star-system-depth map position
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/shared/vec2-local.json
      responses:
        '200':
          description: Updated player
          content:
            application/json:
              schema:
                $ref: schemas/responses/player-wrapper.json
        '400':
          $ref: openapi-shared.yaml#/components/responses/BadRequest
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound
        '409':
          $ref: openapi-shared.yaml#/components/responses/Conflict

  /players/me/location/planet:
    patch:
      tags: [Players]
      operationId: updatePlanetHex
      summary: Select or update hex at planet depth
      description: |
        Sets `planet.hex_coords` when the player is at planet depth (overview or hex).
        Use after `enter-planet` without hex coordinates, or to move to another hex.
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: schemas/players/update-planet-hex.json
      responses:
        '200':
          description: Updated player
          content:
            application/json:
              schema:
                $ref: schemas/responses/player-wrapper.json
        '400':
          $ref: openapi-shared.yaml#/components/responses/BadRequest
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound
        '409':
          $ref: openapi-shared.yaml#/components/responses/Conflict

  /players/me/can-enter/cube/{cubeId}:
    get:
      tags: [Players]
      operationId: canEnterCube
      summary: Check whether the player can enter a cube
      description: |
        **Admin users** (`role: admin`) always receive `canEnter: true`.
        Regular players receive `true` only when the target cube matches their current
        `location.cube.id`; movement is not enabled yet.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: cubeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Enter permission for the requested cube
          content:
            application/json:
              schema:
                $ref: schemas/responses/can-enter.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound

  /players/me/can-enter/system/{starSystemId}:
    get:
      tags: [Players]
      operationId: canEnterStarSystem
      summary: Check whether the player can enter a star system
      description: |
        **Admin users** (`role: admin`) always receive `canEnter: true`.
        Regular players receive `true` only when they own at least one unit at **star-system**
        depth (`place_level = starSystem`) in the target system. Planet-surface units do not
        grant access to Solaris.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: starSystemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Enter permission for the requested star system
          content:
            application/json:
              schema:
                $ref: schemas/responses/can-enter.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound

  /players/me/can-enter/planet/{planetId}:
    get:
      tags: [Players]
      operationId: canEnterPlanet
      summary: Check whether the player can enter a planet
      description: |
        **Admin users** (`role: admin`) always receive `canEnter: true`.
        Regular players receive `true` only when the target planet matches their current
        `location.planet.id`; movement is not enabled yet.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: planetId
          in: path
          required: true
          schema:
            type: string
            pattern: '^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}-p[1-9][0-9]*$'
      responses:
        '200':
          description: Enter permission for the requested planet
          content:
            application/json:
              schema:
                $ref: schemas/responses/can-enter.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound

  /cubes/{x}/{y}/{z}:
    get:
      tags: [Galaxy]
      operationId: getCubeByOrigin
      summary: Get or generate cube by center coordinates
      description: |
        Cube centers lie on a 10 LY grid. Coordinates are cube **center** values
        (multiples of 10), not minimum corners.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: openapi-shared.yaml#/components/parameters/cubeCenterX
        - $ref: openapi-shared.yaml#/components/parameters/cubeCenterY
        - $ref: openapi-shared.yaml#/components/parameters/cubeCenterZ
      responses:
        '200':
          description: Cube and stars
          content:
            application/json:
              schema:
                $ref: schemas/responses/cube-with-stars.json
        '400':
          description: Invalid or non-grid-aligned coordinates
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized

  /cubes/{x}/{y}/{z}/stars:
    get:
      tags: [Galaxy]
      operationId: getCubeStarsByOrigin
      summary: Get or generate stars for a cube
      description: "Same find-or-create behavior as `GET /cubes/{x}/{y}/{z}` but returns stars only."
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: openapi-shared.yaml#/components/parameters/cubeCenterX
        - $ref: openapi-shared.yaml#/components/parameters/cubeCenterY
        - $ref: openapi-shared.yaml#/components/parameters/cubeCenterZ
      responses:
        '200':
          description: Stars in the cube
          content:
            application/json:
              schema:
                $ref: schemas/responses/stars-list.json
        '400':
          description: Invalid or non-grid-aligned coordinates
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized

  /cubes/by-name/{name}:
    get:
      tags: [Galaxy]
      operationId: getCubeByName
      summary: Look up cube by hash-based name
      description: Does not generate a new cube when absent.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: name
          in: path
          required: true
          description: Hash-based cube label (e.g. `kikyhk`)
          schema:
            type: string
      responses:
        '200':
          description: Cube and stars
          content:
            application/json:
              schema:
                $ref: schemas/responses/cube-with-stars.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          description: Cube not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /stars/{id}:
    get:
      tags: [Galaxy]
      operationId: getStarById
      summary: Get star by UUID
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Star document
          content:
            application/json:
              schema:
                $ref: schemas/responses/star.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound

  /stars:
    get:
      tags: [Galaxy]
      operationId: listStarsByCube
      summary: List stars in a cube
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: cube_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Stars (empty array when cube is unknown or has no stars)
          content:
            application/json:
              schema:
                $ref: schemas/responses/stars-list.json
        '400':
          description: Missing or invalid `cube_id`
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized

  /systems/{systemId}:
    get:
      tags: [Systems]
      operationId: getStarSystem
      summary: Get or generate star system
      description: |
        `systemId` is the parent star UUID (`Star.id`). System `_id` equals the star UUID.
        Returns 404 when the star does not exist.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: systemId
          in: path
          required: true
          description: Parent star UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Star system document
          content:
            application/json:
              schema:
                $ref: schemas/responses/star-system.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '404':
          description: Star not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /systems/{systemId}/units:
    get:
      tags: [Systems, Units]
      operationId: listStarSystemUnitInstances
      summary: List unit instances in a star system
      description: |
        Returns units at **starSystem** depth only (`place_level = starSystem`).
        Excludes units placed on planets inside the system.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: systemId
          in: path
          required: true
          description: Parent star UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Star-system-depth unit instances
          content:
            application/json:
              schema:
                $ref: schemas/responses/unit-instance-with-type-list.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized

  /planets/{planetId}:
    get:
      tags: [Planets]
      operationId: getPlanet
      summary: Get or generate planet surface
      description: |
        `systemId` query param is **required on first entry** when no planet document exists.
        Gas planets return 422 and never get a document.
      security: []
      parameters:
        - name: planetId
          in: path
          required: true
          description: Planet id (`StarSystem.planets[].id`)
          schema:
            type: string
        - name: systemId
          in: query
          required: false
          description: Parent star UUID — required on first document creation
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Planet surface document
          content:
            application/json:
              schema:
                $ref: schemas/responses/planet.json
        '400':
          description: First entry without `systemId`
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound
        '422':
          description: Planet type is `gas` — no enterable surface
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /planets/{planetId}/units:
    get:
      tags: [Planets, Units]
      operationId: listPlanetUnitInstances
      summary: List unit instances on a planet
      description: |
        Returns units at **planet** depth only (`place_level = planet`) for the given planet id.
        Same public visibility as the planet surface route.
      security: []
      parameters:
        - name: planetId
          in: path
          required: true
          description: Planet id (`StarSystem.planets[].id`)
          schema:
            type: string
      responses:
        '200':
          description: Planet-surface unit instances
          content:
            application/json:
              schema:
                $ref: schemas/responses/unit-instance-with-type-list.json

  /units:
    get:
      tags: [Units]
      operationId: listUnitInstancesByOwner
      summary: List unit instances by owner (admin)
      description: |
        Admin tooling route. Returns all unit instances owned by the given player id,
        each with an embedded catalog `type` definition.
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: ownerId
          in: query
          required: true
          description: Player profile UUID (`Player.id`)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Owned unit instances
          content:
            application/json:
              schema:
                $ref: schemas/responses/unit-instance-with-type-list.json
        '401':
          $ref: openapi-shared.yaml#/components/responses/Unauthorized
        '403':
          description: Authenticated user is not an admin
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json
        '404':
          description: Player profile not found
          content:
            application/json:
              schema:
                $ref: schemas/responses/http-error.json

  /resources/planet/{planetId}/hex/{q}/{r}:
    get:
      tags: [Resources]
      operationId: getPlanetHexResources
      summary: List resources on a planet hex
      description: |
        Resolves permanent terrain resources for the hex cell identified by axial coordinates
        `(q, r)`. Uses the MongoDB planet document when present, otherwise falls back to an
        admin preview planet cached in Redis (1 hour TTL).
      security: []
      parameters:
        - name: planetId
          in: path
          required: true
          schema:
            type: string
        - name: q
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
        - name: r
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Hex resources
          content:
            application/json:
              schema:
                $ref: schemas/responses/planet-hex-resources.json
        '400':
          $ref: openapi-shared.yaml#/components/responses/BadRequest
        '404':
          $ref: openapi-shared.yaml#/components/responses/NotFound

  /resources/planet/{planetId}:
    get:
      tags: [Resources]
      operationId: listPlanetResources
      summary: List resource nodes on a planet
      description: |
        Reads the dedicated `resources` MongoDB collection (may be empty).
        Preview planets cached in Redis return an empty array.
      security: []
      parameters:
        - name: planetId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resource nodes (possibly empty array)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: schemas/responses/resource-node.json

components:
  securitySchemes:
    bearerAuth:
      $ref: openapi-shared.yaml#/components/securitySchemes/bearerAuth
    cookieAuth:
      $ref: openapi-shared.yaml#/components/securitySchemes/cookieAuth
  parameters:
    userId:
      $ref: openapi-shared.yaml#/components/parameters/userId
    cubeCenterX:
      $ref: openapi-shared.yaml#/components/parameters/cubeCenterX
    cubeCenterY:
      $ref: openapi-shared.yaml#/components/parameters/cubeCenterY
    cubeCenterZ:
      $ref: openapi-shared.yaml#/components/parameters/cubeCenterZ
  responses:
    BadRequest:
      $ref: openapi-shared.yaml#/components/responses/BadRequest
    Unauthorized:
      $ref: openapi-shared.yaml#/components/responses/Unauthorized
    NotFound:
      $ref: openapi-shared.yaml#/components/responses/NotFound
    Conflict:
      $ref: openapi-shared.yaml#/components/responses/Conflict
